<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Page Ad Print Template</title>
    <style>
        /*
          Setup de impressão com CSS Paged Media.
          Padrão US Letter (8.5in x 11in) com 0.125in de bleed para revistas.
        */
        @page {
            size: 8.75in 11.25in; /* 8.5+0.25 x 11+0.25 (bleed em ambos os lados) */
            margin: 0;
        }

        :root {
            --brand-primary: #1E3A8A; /* Azul Corporativo 1FBR */
            --brand-secondary: #EAB308; /* Amarelo / Gold */
            --brand-font: 'Inter', sans-serif;
            --bleed-margin: 0.125in;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--brand-font);
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Container que simula a página impressa com bleed */
        .ad-canvas {
            width: 8.75in;
            height: 11.25in;
            background: #111; /* Cor de fundo forte para o anúncio */
            color: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Safe area para o texto importante */
        .safe-area {
            position: absolute;
            top: 0.5in; /* Margem de segurança maior para revistas */
            left: 0.5in;
            right: 0.5in;
            bottom: 0.5in;
            border: 1px dashed rgba(255,255,255,0.3); /* Linha visual na tela */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        /* Esconder elementos de debug na impressão final */
        @media print {
            body { background: none; }
            .ad-canvas { box-shadow: none; width: 100%; height: 100%; }
            .safe-area { border: none; }
        }

        /* Elementos de Design do Anúncio */
        .hero-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1557804506-669a67965ba0?auto=format&fit=crop&q=80&w=2574&ixlib=rb-4.0.3') center/cover no-repeat;
            opacity: 0.5;
        }

        .content {
            position: relative;
            z-index: 10;
            padding-top: 1in;
        }

        .headline {
            font-size: 64pt;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 0.25in;
            text-transform: uppercase;
        }

        .subheadline {
            font-size: 24pt;
            font-weight: 300;
            color: var(--brand-secondary);
            max-width: 6in;
            line-height: 1.3;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 0.25in;
        }

        .cta {
            background: var(--brand-secondary);
            color: #000;
            padding: 0.2in 0.4in;
            font-size: 16pt;
            font-weight: bold;
            text-transform: uppercase;
        }

        .logo-box {
            font-size: 24pt;
            font-weight: bold;
            color: #fff;
            border: 4px solid #fff;
            padding: 0.1in 0.2in;
        }
    </style>
</head>
<body>

    <div class="ad-canvas">
        <div class="hero-image"></div>
        <div class="safe-area">
            <div class="content">
                <div class="headline">Design<br>Without<br>Limits</div>
                <div class="subheadline">A nova plataforma gráfica da 1FBR Studio conecta o seu fluxo de impressão direto à sua redação online.</div>
            </div>
            
            <div class="footer">
                <div class="logo-box">1FBR</div>
                <div class="cta">Discover More</div>
            </div>
        </div>
    </div>

</body>
</html>
